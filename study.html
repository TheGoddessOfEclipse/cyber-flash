<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-FLASH: 訓練模組</title>
    <style>
        :root { --neon-cyan: #00ffff; --neon-pink: #ff00ff; --neon-green: #39ff14; --neon-yellow: #fffb00; --neon-orange: #ff8c00; --dark-bg: #090a0f; --text-main: #e0e6ed; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--dark-bg); background-image: linear-gradient(rgba(0, 255, 255, 0.08) 1px, transparent 1px), linear-gradient(90deg, rgba(255, 0, 255, 0.08) 1px, transparent 1px); background-size: 40px 40px; margin: 0; padding: 20px; color: var(--text-main); display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .nav-bar { width: 100%; max-width: 800px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 40px; flex-wrap: wrap; gap: 10px;}
        .mode-title { font-size: 26px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-yellow), var(--neon-cyan)); background-size: 300%; background-clip: text; -webkit-background-clip: text; color: transparent; animation: textGlow 5s linear infinite; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        @keyframes textGlow { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        button { cursor: pointer; transition: 0.3s; font-family: inherit; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        select { background-color: rgba(0, 0, 0, 0.6); color: var(--neon-cyan); border: 1px solid var(--neon-cyan); border-radius: 4px; padding: 8px; font-size: 14px; outline: none; }
        .btn-secondary { padding: 10px 20px; background: transparent; color: var(--neon-pink); border: 1px solid var(--neon-pink); box-shadow: 0 0 8px rgba(255, 0, 255, 0.2); border-radius: 4px; }
        .btn-action { padding: 12px 30px; background: transparent; border-radius: 4px; font-size: 16px;}
        .btn-cyan { color: var(--neon-cyan); border: 1px solid var(--neon-cyan); } .btn-orange { color: var(--neon-orange); border: 1px solid var(--neon-orange); } .btn-green { color: var(--neon-green); border: 1px solid var(--neon-green); }
        .study-container { width: 100%; max-width: 600px; text-align: center; display: none; }
        .active { display: block; animation: bootUp 0.5s ease-out; }
        @keyframes bootUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .big-card { width: 100%; height: 350px; perspective: 1000px; cursor: pointer; margin-bottom: 20px; touch-action: pan-y; }
        .card-inner { width: 100%; height: 100%; position: relative; transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .big-card.flipped .card-inner { transform: rotateY(180deg); }
        .card-front, .card-back { width: 100%; height: 100%; position: absolute; backface-visibility: hidden; border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; box-sizing: border-box; background-color: rgba(10, 12, 18, 0.95); }
        .card-front { border: 2px solid var(--neon-cyan); box-shadow: 0 0 25px rgba(0, 255, 255, 0.15); }
        .big-word { font-size: 48px; font-weight: bold; color: #fff; text-shadow: 0 0 15px var(--neon-cyan); letter-spacing: 2px; }
        .card-back { border: 2px solid var(--neon-yellow); box-shadow: 0 0 25px rgba(255, 251, 0, 0.15); transform: rotateY(180deg); padding: 40px 20px;}
        .big-translation { font-size: 24px; font-weight: bold; line-height: 1.6; color: #fff; text-align: left; width: 100%; overflow-y: auto; max-height: 100%; }
        
        .controls { display: flex; justify-content: space-between; gap: 15px; width: 100%; max-width: 400px; margin: 0 auto; }
        .progress-text { margin-top: 15px; color: var(--neon-cyan); font-size: 14px; letter-spacing: 3px; font-family: monospace;}

        .quiz-box { background: rgba(10, 15, 25, 0.8); border: 1px solid #333; border-top: 3px solid var(--neon-pink); padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);}
        .quiz-question { font-size: 42px; font-weight: bold; margin-bottom: 30px; color: #fff; text-shadow: 0 0 15px var(--neon-pink); letter-spacing: 1px;}
        .quiz-input { background: rgba(0,0,0,0.6); color: var(--neon-yellow); border: 2px solid #555; padding: 15px; font-size: 24px; width: 80%; text-align: center; margin-bottom: 20px; border-radius: 4px; outline: none; }
        .feedback { margin-top: 20px; font-size: 20px; font-weight: bold; min-height: 30px;}
        .correct { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .wrong { color: var(--neon-orange); text-shadow: 0 0 10px var(--neon-orange); }

        .mcq-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        @media (max-width: 500px) { .mcq-grid { grid-template-columns: 1fr; } }
        .mcq-btn { background: rgba(0,0,0,0.6); color: #fff; border: 1px solid var(--neon-cyan); padding: 20px 10px; font-size: 16px; border-radius: 8px; transition: 0.2s; word-break: break-all;}
        .mcq-btn:hover:not(:disabled) { background: rgba(0,255,255,0.2); box-shadow: 0 0 15px var(--neon-cyan); }
        .mcq-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .mcq-correct { background: rgba(57,255,20,0.3) !important; border-color: var(--neon-green) !important; box-shadow: 0 0 15px var(--neon-green); }
        .mcq-wrong { background: rgba(255,102,0,0.3) !important; border-color: var(--neon-orange) !important; }

        .result-box { background: rgba(10, 15, 25, 0.9); border: 1px solid var(--neon-cyan); padding: 30px; border-radius: 8px; text-align: left; }
        .result-item { border-bottom: 1px dashed #333; padding: 15px 0; display: flex; justify-content: space-between; align-items: center;}
    </style>
</head>
<body>
    <div class="nav-bar">
        <div class="mode-title" id="displayTitle">SYSTEM LOADING...</div>
        <select id="studySortFilter" style="margin: 0 15px;">
            <option value="newest">🕒 由新到舊</option><option value="oldest">⏳ 由舊到新</option><option value="a-z">🔤 A ~ Z</option><option value="random">🎲 隨機順序</option>
        </select>
        <button class="btn-secondary" id="btnGoBack">🔙 返回節點</button>
    </div>

    <div id="loading" style="color: var(--neon-cyan); font-size: 18px;">[ 連線至雲端資料庫取得題庫中... ]</div>

    <div id="flashcardMode" class="study-container">
        <div style="font-size: 12px; color: #888; margin-bottom: 10px;">💡 提示：點擊卡片翻面，左右滑動進行分類</div>
        
        <div class="big-card" id="studyCard">
            <div class="card-inner">
                <div class="card-front">
                    <div class="big-word" id="fcWord"></div>
                    <button id="btnPlaySoundFront" class="btn-action btn-cyan" style="position: absolute; bottom: 20px; right: 20px; padding: 10px; border-radius: 50%;">🔊</button>
                </div>
                <div class="card-back">
                    <div class="big-translation" id="fcTranslation"></div>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn-action btn-orange" id="btnSwipeLeft" style="flex: 1; padding: 15px; font-size: 16px;">◄ 標為未精熟</button>
            <button class="btn-action btn-green" id="btnSwipeRight" style="flex: 1; padding: 15px; font-size: 16px;">標為已精熟 ►</button>
        </div>
        
        <div style="margin-top: 15px;">
            <button class="btn-action" id="btnPrevCard" style="font-size: 12px; padding: 5px 15px; color: #aaa; border: 1px solid #444;">↺ 返回上一張</button>
        </div>

        <div class="progress-text" id="fcProgress">SEQ: 0 / 0</div>

        <div style="margin-top: 30px; width: 100%; max-width: 400px; margin-left: auto; margin-right: auto; padding-top: 20px; border-top: 1px dashed #333;">
            <div style="font-size: 12px; color: #888; margin-bottom: 8px; text-align: left;">[ 快速跳轉指定單字 ]</div>
            <select id="jumpToWordList" style="width: 100%; font-size: 16px; padding: 12px; background: rgba(0,0,0,0.8); border: 1px solid var(--neon-cyan); color: var(--neon-cyan); cursor: pointer; text-align: left; border-radius: 4px;">
            </select>
        </div>
    </div>

    <div id="quizMode" class="study-container">
        <div class="quiz-box">
            <div style="color: var(--neon-cyan); margin-bottom: 10px;">[ 拼字破解任務 ]</div>
            <div class="quiz-question" id="quizWord"></div>
            <input type="text" class="quiz-input" id="quizInput" placeholder="輸入中文意思..." autocomplete="off">
            <div class="feedback" id="quizFeedback"></div>
            <div style="margin-top: 30px;">
                <button class="btn-action btn-green" id="btnCheckAnswer">驗證</button>
                <button class="btn-action btn-orange" id="btnSkip">跳過</button>
            </div>
        </div>
        <div class="progress-text" id="quizProgress">進度: 0 / 0</div>
    </div>

    <div id="mcqMode" class="study-container">
        <div class="quiz-box" style="border-top-color: var(--neon-orange);">
            <div style="color: var(--neon-orange); margin-bottom: 10px;">[ 四選一光速挑戰 ]</div>
            <div class="quiz-question" id="mcqWord"></div>
            <div id="mcqOptions" class="mcq-grid"></div>
            <div class="feedback" id="mcqFeedback"></div>
            <button class="btn-action btn-green" id="btnNextMcq" style="margin-top: 20px; display: none; width: 100%;">下一題 ►</button>
        </div>
        <div class="progress-text" id="mcqProgress" style="color: var(--neon-orange);">進度: 0 / 0</div>
    </div>

    <div id="resultMode" class="study-container">
        <div class="result-box">
            <div class="score-text" id="finalScoreText">任務結算</div>
            <div id="resultList" style="max-height: 350px; overflow-y: auto; margin-bottom: 20px;"></div>
            <div style="text-align: center;">
                <button class="btn-action btn-orange" id="btnRetryWrong">🔄 重新閱覽 / 錯題重作</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDWesVsdrEhh7Yv__ZCjitWOB3xTqG2QoM",
            authDomain: "cyberflash-9826e.firebaseapp.com",
            databaseURL: "https://cyberflash-9826e-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "cyberflash-9826e",
            storageBucket: "cyberflash-9826e.firebasestorage.app",
            messagingSenderId: "412850699903",
            appId: "1:412850699903:web:1313c5caa3e76b4e2b494a"
        };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        let originalCards = [], cards = [], currentIndex = 0, studyStartTime = Date.now(), quizHistory = [], mcqCorrectAnswer = "";
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode'); 
        const username = localStorage.getItem('fc_username'), deck = localStorage.getItem('fc_study_deck'), filterMode = localStorage.getItem('fc_study_filter') || 'all';

        function getCardMeaningStr(c) {
            if(c.definitions) return c.definitions.map(d => (d.meanings||[]).join('、')).join(' / ');
            return c.chinese.replace(/<br>/g, ' ');
        }

        window.onload = async () => {
            if (!username || !deck) window.location.href='index.html';
            document.getElementById('displayTitle').innerText = `[ ${deck} ]`;
            try {
                const snapshot = await get(ref(db, `cards/${username}`));
                if (!snapshot.exists()) throw new Error('No Data');
                let fetchedData = Object.entries(snapshot.val()).map(([id, val]) => ({ id, ...val })).filter(c => c.deck === deck);
                
                // 讀取過濾條件
                if (filterMode === 'difficult') fetchedData = fetchedData.filter(c => String(c.is_difficult).toLowerCase() === 'true');
                if (filterMode === 'important') fetchedData = fetchedData.filter(c => String(c.is_important).toLowerCase() === 'true');
                
                originalCards = [...fetchedData];
                document.getElementById('loading').style.display = 'none';
                if (originalCards.length === 0) { alert('無數據！'); window.location.href = 'deck.html'; return; }
                
                document.getElementById('studySortFilter').dispatchEvent(new Event('change'));
            } catch (e) { alert('讀取異常！'); window.location.href='deck.html'; }
        };

        document.getElementById('studySortFilter').onchange = (e) => {
            const sortMethod = e.target.value; cards = [...originalCards];
            cards.sort((a, b) => {
                if (sortMethod === 'a-z') return a.english.localeCompare(b.english);
                if (sortMethod === 'length') return a.english.length - b.english.length;
                if (sortMethod === 'oldest') return a.timestamp - b.timestamp;
                if (sortMethod === 'random') return Math.random() - 0.5; 
                return b.timestamp - a.timestamp; 
            });
            currentIndex = 0; startMode();
        };

        // ✨ 更新單字跳轉清單 ✨
        function updateJumpList() {
            const jumpSelect = document.getElementById('jumpToWordList');
            if (!jumpSelect) return;
            jumpSelect.innerHTML = '';
            cards.forEach((c, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                let statusIcon = '';
                if (String(c.is_difficult).toLowerCase() === 'true') statusIcon = '⚠️ ';
                if (String(c.is_important).toLowerCase() === 'true') statusIcon = '✅ ';
                opt.innerText = `${i + 1}. ${statusIcon}${c.english}`;
                jumpSelect.appendChild(opt);
            });
        }

        // 選擇跳轉事件
        document.getElementById('jumpToWordList').onchange = (e) => {
            currentIndex = parseInt(e.target.value);
            loadFlashcard();
        };

        function startMode() {
            document.querySelectorAll('.study-container').forEach(el => el.classList.remove('active'));
            if (mode === 'flashcard') { 
                document.getElementById('flashcardMode').classList.add('active'); 
                updateJumpList(); // 排序改變時，更新跳轉清單
                loadFlashcard(); 
            }
            else if (mode === 'quiz') { document.getElementById('quizMode').classList.add('active'); quizHistory = []; loadQuiz(); }
            else if (mode === 'mcq') { document.getElementById('mcqMode').classList.add('active'); quizHistory = []; loadMcq(); }
        }

        // ================= 1. 閃卡模式 =================
        function loadFlashcard() {
            const card = cards[currentIndex]; document.getElementById('studyCard').classList.remove('flipped');
            document.getElementById('fcWord').innerText = card.english;
            
            let backHtml = '';
            if(card.definitions) {
                backHtml = card.definitions.map(def => `
                    <div style="margin-bottom: 15px;">
                        <span style="color: var(--neon-pink); font-size: 18px;">${(def.pos||[]).map(p=>`(${p})`).join('')}</span> 
                        <span style="color: #fff;">${(def.meanings||[]).join('；')}</span>
                        ${def.example ? `<div style="color: #aaa; font-size: 16px; margin-top: 8px; border-left: 3px solid #555; padding-left: 10px;">${def.example}</div>` : ''}
                        ${def.source ? `<div style="color: #666; font-size: 14px; margin-top: 5px;">出處: ${def.source}</div>` : ''}
                    </div>`).join('<hr style="border-top: 1px dashed #444; margin: 15px 0;">');
            } else { backHtml = `<span style="color: var(--neon-pink);">${card.pos||''}</span> ${card.chinese}`; }
            
            document.getElementById('fcTranslation').innerHTML = backHtml;
            document.getElementById('fcProgress').innerText = `SEQ: ${currentIndex + 1} / ${cards.length}`;
            
            // 更新跳轉清單的目前選項
            const jumpSelect = document.getElementById('jumpToWordList');
            if(jumpSelect) jumpSelect.value = currentIndex;

            setTimeout(() => { speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(card.english); u.lang = 'en-US'; speechSynthesis.speak(u); }, 200);
        }
        
        // 分類與跳下一張邏輯
        function markCard(status) {
            const c = cards[currentIndex];
            let isDiff = 'false', isImp = 'false';
            
            if (status === 'mastered') isImp = 'true'; // 已精熟
            else if (status === 'learning') isDiff = 'true'; // 未精熟
            
            c.is_difficult = isDiff; c.is_important = isImp;
            update(ref(db, `cards/${username}/${c.id}`), { is_difficult: isDiff, is_important: isImp });
            
            updateJumpList(); // 標記狀態改變後，刷新跳轉清單上的 icon
            
            if (currentIndex >= cards.length - 1) showResults(); 
            else { currentIndex++; loadFlashcard(); }
        }

        document.getElementById('btnSwipeRight').onclick = (e) => { e.stopPropagation(); markCard('mastered'); };
        document.getElementById('btnSwipeLeft').onclick = (e) => { e.stopPropagation(); markCard('learning'); };
        document.getElementById('btnPrevCard').onclick = () => { if (currentIndex > 0) { currentIndex--; loadFlashcard(); } };

        let touchstartX = 0; let touchendX = 0; let preventFlip = false;
        const studyCard = document.getElementById('studyCard');
        studyCard.addEventListener('touchstart', e => { touchstartX = e.changedTouches[0].screenX; }, {passive: true});
        studyCard.addEventListener('touchend', e => {
            touchendX = e.changedTouches[0].screenX;
            if (Math.abs(touchendX - touchstartX) > 50) {
                preventFlip = true;
                if (touchendX < touchstartX) markCard('learning'); else markCard('mastered');
                setTimeout(() => { preventFlip = false; }, 300); 
            }
        });

        studyCard.onclick = (e) => { 
            if (preventFlip) return;
            if (e.target.tagName !== 'BUTTON') studyCard.classList.toggle('flipped'); 
        };
        
        document.getElementById('btnPlaySoundFront').onclick = (e) => { e.stopPropagation(); speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(cards[currentIndex].english); u.lang = 'en-US'; speechSynthesis.speak(u); };

        // ================= 2. 拼字填空模式 =================
        function loadQuiz() {
            const inputEl = document.getElementById('quizInput'); inputEl.value = ''; inputEl.disabled = false;
            document.getElementById('quizFeedback').innerText = ''; document.getElementById('quizWord').innerText = cards[currentIndex].english;
            document.getElementById('quizProgress').innerText = `已完成: ${currentIndex} / ${cards.length}`; inputEl.focus();
        }
        document.getElementById('btnCheckAnswer').onclick = () => {
            const inputEl = document.getElementById('quizInput'); const ans = inputEl.value.trim(); if (!ans || inputEl.disabled) return;
            inputEl.disabled = true; const correctAns = getCardMeaningStr(cards[currentIndex]);
            const isCorrect = correctAns.includes(ans);
            quizHistory.push({ word: cards[currentIndex].english, userAns: ans, correctAns: correctAns, isCorrect: isCorrect });
            if (isCorrect) {
                document.getElementById('quizFeedback').className = 'feedback correct'; document.getElementById('quizFeedback').innerText = '✅ 正確';
                setTimeout(() => { currentIndex++; if(currentIndex >= cards.length) showResults(); else loadQuiz(); }, 800);
            } else {
                document.getElementById('quizFeedback').className = 'feedback wrong'; document.getElementById('quizFeedback').innerHTML = `❌ 失敗<br><span style="font-size:14px;color:#aaa;">答案：${correctAns}</span><button class="btn-action" id="btnForceRight" style="border:1px solid var(--neon-cyan); color:var(--neon-cyan); margin-top:10px;">⚡ 給對</button>`;
                document.getElementById('btnForceRight').onclick = () => { quizHistory[quizHistory.length - 1].isCorrect = true; currentIndex++; if(currentIndex >= cards.length) showResults(); else loadQuiz(); };
            }
        };
        document.getElementById('btnSkip').onclick = () => { quizHistory.push({ word: cards[currentIndex].english, userAns: "(跳過)", correctAns: getCardMeaningStr(cards[currentIndex]), isCorrect: false }); currentIndex++; if(currentIndex >= cards.length) showResults(); else loadQuiz(); };

        // ================= 3. 四選一模式 =================
        function loadMcq() {
            const card = cards[currentIndex]; mcqCorrectAnswer = getCardMeaningStr(card);
            document.getElementById('mcqFeedback').innerText = '';
            document.getElementById('btnNextMcq').style.display = 'none';
            document.getElementById('mcqWord').innerText = card.english;
            document.getElementById('mcqProgress').innerText = `進度: ${currentIndex} / ${cards.length}`;

            let options = [mcqCorrectAnswer];
            let otherCards = originalCards.filter(c => c.english !== card.english);
            otherCards.sort(() => Math.random() - 0.5);
            for(let i=0; i<Math.min(3, otherCards.length); i++) { options.push(getCardMeaningStr(otherCards[i])); }
            options.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('mcqOptions'); grid.innerHTML = '';
            options.forEach(opt => {
                const btn = document.createElement('button'); btn.className = 'mcq-btn'; btn.innerText = opt;
                btn.onclick = () => checkMcqAnswer(opt, btn);
                grid.appendChild(btn);
            });
        }
        
        function checkMcqAnswer(selectedOpt, btnElement) {
            document.querySelectorAll('.mcq-btn').forEach(b => b.disabled = true);
            const isCorrect = selectedOpt === mcqCorrectAnswer;
            quizHistory.push({ word: cards[currentIndex].english, userAns: selectedOpt, correctAns: mcqCorrectAnswer, isCorrect: isCorrect });
            
            if(isCorrect) {
                btnElement.classList.add('mcq-correct');
                document.getElementById('mcqFeedback').className = 'feedback correct'; document.getElementById('mcqFeedback').innerText = '✅ 破解成功！';
                setTimeout(() => { nextMcqQuestion(); }, 1000);
            } else {
                btnElement.classList.add('mcq-wrong');
                document.querySelectorAll('.mcq-btn').forEach(b => { if(b.innerText === mcqCorrectAnswer) b.classList.add('mcq-correct'); });
                document.getElementById('mcqFeedback').className = 'feedback wrong'; document.getElementById('mcqFeedback').innerText = '❌ 錯誤！請看正確答案。';
                document.getElementById('btnNextMcq').style.display = 'block';
            }
        }
        document.getElementById('btnNextMcq').onclick = nextMcqQuestion;
        function nextMcqQuestion() { currentIndex++; if(currentIndex >= cards.length) showResults(); else loadMcq(); }

        // ================= 結算與日誌 =================
        function showResults() {
            document.querySelectorAll('.study-container').forEach(el => el.classList.remove('active'));
            document.getElementById('resultMode').classList.add('active');
            const listEl = document.getElementById('resultList'); listEl.innerHTML = '';
            
            if(mode === 'flashcard') {
                document.getElementById('finalScoreText').innerText = `閱覽完畢`;
                listEl.innerHTML = `<div style="text-align:center; color:#aaa; font-size:18px;">總共複習了 ${cards.length} 個單字。<br><span style="font-size:14px; color:#666;">（所有分類紀錄已自動儲存至雲端）</span></div>`;
            } else {
                let correctCount = quizHistory.filter(q => q.isCorrect).length;
                document.getElementById('finalScoreText').innerText = `任務結算: ${correctCount} / ${quizHistory.length} 成功`;
                quizHistory.forEach((q, index) => {
                    listEl.innerHTML += `<div class="result-item"><div>
                        <div style="font-weight:bold; color:#fff;">${q.isCorrect?'<span style="color:#0f0">✅</span>':'<span style="color:#f80">❌</span>'} ${q.word}</div>
                        <div style="font-size:13px; color:#aaa; margin-top:5px;">你的回答: ${q.userAns} <br> 系統答案: ${q.correctAns}</div>
                    </div></div>`;
                });
            }
        }
        
        document.getElementById('btnRetryWrong').onclick = () => {
            if(mode === 'flashcard') { currentIndex=0; startMode(); return; }
            const wrongWords = quizHistory.filter(q => !q.isCorrect).map(q => q.word);
            if(wrongWords.length === 0) return alert('太棒了！全對！');
            cards = originalCards.filter(c => wrongWords.includes(c.english)); currentIndex = 0; startMode();
        };

        document.getElementById('btnGoBack').onclick = async () => {
            document.getElementById('displayTitle').innerText = '💾 同步中...';
            const durationMs = Date.now() - studyStartTime;
            const sortLabelText = document.getElementById('studySortFilter').options[document.getElementById('studySortFilter').selectedIndex].text.split(' ')[1];
            
            let typeName = mode === 'flashcard' ? '單字卡Swipe' : (mode === 'mcq' ? '四選一測驗' : '拼字填空測驗');
            let type = `${typeName} (${sortLabelText})`;
            
            let loggedDeck = deck;
            if(filterMode === 'difficult') loggedDeck += ' (未精熟)';
            if(filterMode === 'important') loggedDeck += ' (已精熟)';
            
            let remarks = mode === 'flashcard' ? `分類學習了 ${cards.length} 個字` : `正確率: ${quizHistory.filter(q=>q.isCorrect).length}/${quizHistory.length}`;
            
            try { await push(ref(db, `logs/${username}`), { timestamp: Date.now(), durationMs: durationMs, deck: loggedDeck, type: type, remarks: remarks }); } catch (e) {}
            window.location.href = 'deck.html';
        };
    </script>
</body>
</html>
